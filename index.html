<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟积分兑换中心</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f9ff;
            border: 1px dashed #007AFF;
            border-radius: 6px;
            display: none;
            text-align: center;
        }
        .code-text {
            font-size: 20px;
            font-family: monospace;
            color: #ff3b30;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>模拟活动兑换系统</h2>
    
    <!-- 表单输入区域 -->
    <div class="form-group">
        <label for="amount">模拟存款/积分金额：</label>
        <input type="number" id="amount" placeholder="请输入数字（如：1000）">
    </div>

    <div class="form-group">
        <label for="activity">选择参与活动：</label>
        <select id="activity">
            <option value="">-- 请选择活动 --</option>
            <option value="act1">活动一：新人全额包赔</option>
            <option value="act2">活动二：首存赠送彩金</option>
            <option value="act3">活动三：首存金额返还</option>
        </select>
    </div>

    <button class="btn" onclick="generateCode()">确认获取代码</button>

    <!-- 结果展示区域 -->
    <div class="result-box" id="resultBox">
        <p style="margin: 0 0 10px 0; color: #333;">您的专属申请代码已生成：</p>
        <div class="code-text" id="codeDisplay">XXXX-XXXX</div>
        <p style="margin: 10px 0 0 0; font-size: 13px; color: #666;">（此代码仅供模拟交互测试使用）</p>
    </div>
</div>

<script>
    function generateCode() {
        const amount = document.getElementById('amount').value;
        const activity = document.getElementById('activity').value;
        const resultBox = document.getElementById('resultBox');
        const codeDisplay = document.getElementById('codeDisplay');

        // 验证用户是否输入和选择
        if (!amount || !activity) {
            alert("⚠️ 请填写完整的金额并选择活动！");
            return;
        }

        // 模拟生成一串随机的活动代码
        const randomCode = 'ACT-' + Math.floor(1000 + Math.random() * 9000) + '-' + activity.toUpperCase();
        
        // 将结果显示在网页上
        codeDisplay.innerText = randomCode;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
