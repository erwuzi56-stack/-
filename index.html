<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026美加墨世界杯</title>
    <style>
        :root {
            --bg-color: #0d1b3e;
            --card-bg: #1a2c5b;
            --accent-gold: #fbc02d;
            --accent-red: #d32f2f;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .poster-container {
            background: linear-gradient(135deg, #0d1b3e 0%, #1a2c5b 100%);
            border: 4px solid var(--accent-gold);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }

        .title {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .download-info {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .highlight-gold {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .invite-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-gold);
            background-color: rgba(251, 192, 45, 0.1);
            border: 2px dashed var(--accent-gold);
            padding: 12px;
            border-radius: 8px;
            margin: 25px 0;
            letter-spacing: 1px;
        }

        .admin-box {
            background-color: var(--accent-red);
            color: var(--text-light);
            border-radius: 50px;
            padding: 15px 20px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }

        .admin-box .sub-title {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .admin-box .contact-id {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .code-box {
            border: 2px solid var(--accent-red);
            background-color: transparent;
            color: var(--accent-red);
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
        }

        .code-space {
            display: inline-block;
            width: 100px;
            border-bottom: 2px solid var(--accent-red);
            margin: 0 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <!-- 主标题 -->
        <div class="title">2026美加墨世界杯</div>

        <!-- 安卓下载指引 -->
        <div class="download-info">
            <span class="highlight-gold">安卓：</span>应用市场搜索：<span class="highlight-gold">企聊宝</span><br>
            如果搜索没有，下载<span class="highlight-gold">应用宝</span>再搜索
        </div>

        <!-- 企业邀请码 -->
        <div class="invite-box">
            企业邀请码：YB888
        </div>

        <!-- 苹果下载指引 -->
        <div class="download-info">
            <span class="highlight-gold">苹果下载：</span>苹果商店搜索<span class="highlight-gold">企聊宝</span>
        </div>

        <!-- 管理员添加内群 -->
        <div class="admin-box">
            <div class="sub-title">添加下方ID，拉入新的企聊宝内群！！</div>
            <div class="contact-id">☀️ 阿星管理：x0806 ☀️</div>
        </div>

        <!-- 发送代码框 -->
        <div class="code-box">
            &gt;&gt;&gt; 发送代码：[<span class="code-space"></span>] &lt;&lt;&lt;
        </div>
    </div>

</body>
</html>
